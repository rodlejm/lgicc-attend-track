{% extends 'base.html' %}
{% block title %}Profile – LGICC | Attend Track{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h5 class="fw-bold mb-4">
                <i class="bi bi-key-fill me-2" style="color:#1976D2;"></i>Change Password
            </h5>

            <div class="mb-3 p-3 rounded-3" style="background:#e3f2fd;">
                <div class="fw-semibold">{{ session.full_name }}</div>
                <div class="text-muted small">{{ session.username }} ·
                    <span class="badge {% if session.role == 'admin' %}bg-danger{% else %}bg-primary{% endif %}">
                        {{ session.role }}
                    </span>
                </div>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Current Password</label>
                    <input type="password" name="current_password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" name="new_password" class="form-control"
                           minlength="6" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control"
                           minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-save me-2"></i>Update Password
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
