{% extends 'base.html' %}
{% block title %}Configuration – LGICC | Attend Track{% endblock %}
{% block content %}

<h4 class="fw-bold mb-4"><i class="bi bi-gear-fill me-2"></i>Service Types</h4>

<div class="card p-4 mb-4">
    <form method="POST">
        <label class="form-label fw-semibold">Add New Service Type</label>
        <div class="input-group">
            <input type="text" name="service_type" class="form-control" placeholder="e.g. Sunday Service" required>
            <button class="btn btn-primary">Add</button>
        </div>
    </form>
</div>

<div class="card p-4">
    <h6 class="fw-bold mb-3">Existing Types</h6>
    {% if types %}
    <ul class="list-group list-group-flush">
        {% for t in types %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ t.name }}
            <form method="POST" action="{{ url_for('delete_service_type', type_id=t.id) }}"
                  onsubmit="return confirm('Delete this type?')">
                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
            </form>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-muted">No service types yet.</p>
    {% endif %}
</div>

{% endblock %}
