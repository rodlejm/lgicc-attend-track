{% extends 'base.html' %}
{% block title %}Church Profile – LGICC | Attend Track{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h5 class="fw-bold mb-4">
                <i class="bi bi-building me-2" style="color:#1976D2;"></i>Church Profile
            </h5>

            <form method="POST">
                <div class="row g-3">

                    <div class="col-md-8">
                        <label class="form-label fw-semibold">Church Name</label>
                        <input type="text" name="church_name" class="form-control"
                               value="{{ profile.church_name or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Founded Year</label>
                        <input type="text" name="founded_year" class="form-control"
                               value="{{ profile.founded_year or '' }}"
                               placeholder="e.g. 2005">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Pastor Name</label>
                        <input type="text" name="pastor_name" class="form-control"
                               value="{{ profile.pastor_name or '' }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Denomination</label>
                        <input type="text" name="denomination" class="form-control"
                               value="{{ profile.denomination or '' }}"
                               placeholder="e.g. Pentecostal">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Address</label>
                        <input type="text" name="address" class="form-control"
                               value="{{ profile.address or '' }}"
                               placeholder="Street address">
                    </div>

                    <div class="col-md-5">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" name="city" class="form-control"
                               value="{{ profile.city or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">State</label>
                        <input type="text" name="state" class="form-control"
                               value="{{ profile.state or '' }}">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">ZIP Code</label>
                        <input type="text" name="zip_code" class="form-control"
                               value="{{ profile.zip_code or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="text" name="phone" class="form-control"
                               value="{{ profile.phone or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ profile.email or '' }}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Website</label>
                        <input type="text" name="website" class="form-control"
                               value="{{ profile.website or '' }}"
                               placeholder="https://...">
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-save me-2"></i>Save Church Profile
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
